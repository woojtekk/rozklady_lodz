name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      bump_part:
        description: Version segment to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump manifest version
        id: bump
        run: |
          PART="${{ github.event.inputs.bump_part || 'patch' }}"
          NEW_VERSION=$(python scripts/bump_manifest_version.py custom_components/rozklady_lodz/manifest.json --part "$PART")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/rozklady_lodz/manifest.json
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create release package
        run: |
          rm -f rozkladylodz.zip
          cd custom_components
          zip -r ../rozkladylodz.zip rozklady_lodz

      - name: Create git tag
        run: |
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          files: rozkladylodz.zip
          generate_release_notes: true
